<!DOCTYPE html>
<html lang="hu">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zeneszerző vagy olasz tészta?</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
}

.screen{
    display:none;
    min-height:100vh;
}

.active{
    display:flex;
}

/* START PAGE */

#startPage{
    background:url('thinking-bass-player.png');
    background-size:cover;
    background-position:center;
    justify-content:center;
    align-items:center;
}

.overlay{
    background:rgba(0,0,0,0.7);
    color:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    max-width:700px;
}

.overlay h1{
    font-size:3rem;
}

.overlay p{
    font-size:1.2rem;
}

button{
    background:#f5b700;
    border:none;
    padding:15px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

/* QUIZ PAGE */

#quizPage{
    background:#f7f7f7;
    flex-direction:column;
    align-items:center;
    padding:40px;
}

.quiz-box{
    background:white;
    max-width:800px;
    width:100%;
    padding:30px;
    border-radius:10px;
}

.question{
    margin-bottom:20px;
}

.question h3{
    margin-bottom:10px;
}

/* RESULT PAGE */

#resultPage{
    background:#ffffff;
    flex-direction:column;
    align-items:center;
    padding:30px;
}

#score{
    font-size:48px;
    font-weight:bold;
    margin:20px 0;
}

.ticket{
    width:100%;
    max-width:900px;
    margin:20px auto;
    display:block;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<!-- START PAGE -->

<div id="startPage" class="screen active">

    <div class="overlay">

        <h1>Zeneszerző vagy olasz tészta?</h1>

        <p>
            Vajon meg tudod különböztetni az olasz tésztákat a zeneszerzőktől?
        </p>

        <button onclick="startQuiz()">
            Kvíz indítása
        </button>

    </div>

</div>

<!-- QUIZ PAGE -->

<div id="quizPage" class="screen">

<div class="quiz-box">

<h2>Kvíz</h2>

<div class="question">
<h3>1. Testaroli</h3>
<label><input type="radio" name="q1" value="composer"> Zeneszerző</label>
<label><input type="radio" name="q1" value="pasta"> Tészta</label>
</div>

<div class="question">
<h3>2. Galuppi</h3>
<label><input type="radio" name="q2" value="composer"> Zeneszerző</label>
<label><input type="radio" name="q2" value="pasta"> Tészta</label>
</div>

<div class="question">
<h3>3. Bucatini</h3>
<label><input type="radio" name="q3" value="composer"> Zeneszerző</label>
<label><input type="radio" name="q3" value="pasta"> Tészta</label>
</div>

<div class="question">
<h3>4. Gemelli</h3>
<label><input type="radio" name="q4" value="composer"> Zeneszerző</label>
<label><input type="radio" name="q4" value="pasta"> Tészta</label>
</div>

<div class="question">
<h3>5. Geminiani</h3>
<label><input type="radio" name="q5" value="composer"> Zeneszerző</label>
<label><input type="radio" name="q5" value="pasta"> Tészta</label>
</div>

<div class="question">
<h3>6. Campagnoli</h3>
<label><input type="radio" name="q6" value="composer"> Zeneszerző</label>
<label><input type="radio" name="q6" value="pasta"> Tészta</label>
</div>

<div class="question">
<h3>7. Rotelli</h3>
<label><input type="radio" name="q7" value="composer"> Zeneszerző</label>
<label><input type="radio" name="q7" value="pasta"> Tészta</label>
</div>

<div class="question">
<h3>8. Manicotti</h3>
<label><input type="radio" name="q8" value="composer"> Zeneszerző</label>
<label><input type="radio" name="q8" value="pasta"> Tészta</label>
</div>

<div class="question">
<h3>9. Giazotto</h3>
<label><input type="radio" name="q9" value="composer"> Zeneszerző</label>
<label><input type="radio" name="q9" value="pasta"> Tészta</label>
</div>

<div class="question">
<h3>10. Jacchini</h3>
<label><input type="radio" name="q10" value="composer"> Zeneszerző</label>
<label><input type="radio" name="q10" value="pasta"> Tészta</label>
</div>

<button onclick="checkQuiz()">
Eredmény
</button>

</div>

</div>

<!-- RESULT PAGE -->

<div id="resultPage" class="screen">

<h1>🎉 Gratulálunk! 🎉</h1>

<div id="score"></div>

<p id="message"></p>

<div id="ticketSection">

<h2>Nyertes jegyek</h2>

<img src="ticket1.png" class="ticket">

<img src="ticket2.png" class="ticket">

</div>

<br>

<button onclick="location.reload()">
Újra játszom
</button>

</div>


<script>

const answers = {
q1:"pasta",
q2:"composer",
q3:"pasta",
q4:"pasta",
q5:"composer",
q6:"composer",
q7:"pasta",
q8:"pasta",
q9:"composer",
q10:"composer"
};

function startQuiz(){

document.getElementById("startPage").classList.remove("active");
document.getElementById("quizPage").classList.add("active");

}

function checkQuiz(){

let score = 0;

for(let q in answers){

let selected =
document.querySelector(`input[name="${q}"]:checked`);

if(!selected){

alert("Kérlek válaszolj minden kérdésre!");

return;
}

if(selected.value === answers[q]){
score++;
}

}

document.getElementById("quizPage").classList.remove("active");
document.getElementById("resultPage").classList.add("active");

document.getElementById("score").innerText =
score + " / 10";

if(score >= 8){

document.getElementById("message").innerText =
"Remek eredmény! A koncertjegyek lent láthatók.";

}
else{

document.getElementById("message").innerText =
"Szép próbálkozás! A jegyek megtekintéséhez legalább 8 pont szükséges.";

document.getElementById("ticketSection").style.display = "none";

}

}

</script>

</body>
</html>
